<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SonicDelivery Bot</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      color: #0099ff;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    a.button {
      display: inline-block;
      color: white;
      background: linear-gradient(90deg, #0066cc, #0099ff);
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
      transition: transform 0.1s, box-shadow 0.2s;
    }

    a.button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 102, 204, 0.4);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }
      p {
        font-size: 15px;
      }
      a.button {
        padding: 12px 24px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SonicDelivery — Sonic‑themed Discord bot</h1>
    <p>
      A Sonic‑themed Discord bot with food commands, Sonic Dash mini‑game, rings, XP, inventory, achievements, and a ring shop. Under active development with new features and updates.
    </p>
    <a href="https://discord.com/oauth2/authorize?client_id=1438980765189804083&permissions=92160&integration_type=0&scope=bot+applications.commands" class="button">
      Invite SonicDelivery to your server
    </a>
  </div>
</body>
</html>
